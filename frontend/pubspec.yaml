name: adhd_shell
description: Cross-platform front-end shell for the ADHD screening + training engine.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP REST client (calls into the FastAPI engine)
  http: ^1.2.2

  # WebSocket client — works on desktop, mobile and web
  web_socket_channel: ^3.0.1

  # Charting (radar / timeline plots in the report page)
  fl_chart: ^0.69.2

  # Date / number formatting
  intl: ^0.19.0

  # Material icons & fonts
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Bundled Chinese fonts. Flutter Web (CanvasKit) cannot access system
  # fonts so we ship our own. Previously we used a single variable font
  # here — but Flutter's variable-font pipeline defaulted to the `Thin`
  # axis instance for the file, making every character render as a ghostly
  # hairline that looked like an empty rectangle. Two static OTF weights
  # (Regular + Bold) side-step the variable-font issue entirely and are
  # known to render correctly on every Flutter target.
  #
  # Source: https://github.com/notofonts/noto-cjk (Adobe / Google,
  # SIL Open Font License 1.1 — commercial use permitted, license file
  # bundled next to the assets).
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.otf
          weight: 400
        - asset: assets/fonts/NotoSansSC-Bold.otf
          weight: 700
